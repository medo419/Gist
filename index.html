<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salatuk Pro - أوقات الصلاة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            direction: rtl;
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ecf0f1;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .language-select, .theme-toggle {
            padding: 10px 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .language-select:hover, .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .language-select option {
            background-color: #1a1a2e;
            color: white;
        }

        .navigation {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 25px 20px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        body.dark-mode .navigation {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        body.dark-mode .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border-color: #667eea;
            color: #ecf0f1;
        }

        .nav-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Prayer Times Styles */
        .prayer-times-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .prayer-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .prayer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.dark-mode .prayer-card {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .prayer-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .prayer-card.next {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: 3px solid #f5576c;
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.3);
            animation: pulse 2s infinite;
        }

        .prayer-card.next::before {
            background: #f5576c;
        }

        .prayer-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .prayer-name {
            font-size: 18px;
            font-weight: 600;
            margin: 12px 0;
            color: #2c3e50;
        }

        .prayer-card.next .prayer-name {
            color: white;
        }

        body.dark-mode .prayer-name {
            color: #ecf0f1;
        }

        .prayer-time {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #667eea;
        }

        .prayer-card.next .prayer-time {
            color: white;
        }

        .next-prayer-alert {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.3);
            animation: slideIn 0.5s ease;
        }

        .next-prayer-alert h3 {
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .next-prayer-time {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 15px 40px rgba(245, 87, 108, 0.3); }
            50% { box-shadow: 0 15px 50px rgba(245, 87, 108, 0.6); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Compass Styles */
        .compass-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        .compass-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
            aspect-ratio: 1;
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            overflow: hidden;
        }

        body.dark-mode .compass-wrapper {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .compass {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #667eea 0deg,
                #764ba2 90deg,
                #f093fb 180deg,
                #f5576c 270deg,
                #667eea 360deg
            );
            border: 8px solid white;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.2), 0 0 30px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.dark-mode .compass {
            border-color: rgba(102, 126, 234, 0.3);
        }

        .compass-direction {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 28px;
            color: white;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.4);
        }

        .compass-direction.north { transform: translateY(-45%); }
        .compass-direction.east { transform: translateX(45%); }
        .compass-direction.south { transform: translateY(45%); }
        .compass-direction.west { transform: translateX(-45%); }

        .qibla-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s linear;
        }

        .qibla-indicator {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.6);
            z-index: 10;
        }

        body.dark-mode .compass-center {
            background: radial-gradient(circle at 30% 30%, #444, #222);
        }

        .compass-info {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
        }

        body.dark-mode .compass-info {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .compass-info h3 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #667eea;
            font-weight: 600;
        }

        .qibla-angle {
            font-size: 42px;
            font-weight: 700;
            color: #f5576c;
            margin: 15px 0;
            letter-spacing: 1px;
        }

        .coordinates {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }

        body.dark-mode .coordinates {
            color: #bdc3c7;
        }

        /* Adhkar Styles */
        .adhkar-container {
            padding: 20px 0;
        }

        .adhkar-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .category-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }

        body.dark-mode .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border-color: #667eea;
            color: #ecf0f1;
        }

        .category-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .adhkar-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            margin: 0 auto;
            max-width: 550px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.15);
            animation: slideIn 0.5s ease;
        }

        body.dark-mode .adhkar-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.2);
        }

        .adhkar-counter {
            text-align: center;
            font-size: 13px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .adhkar-text {
            text-align: center;
            margin: 40px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .arabic {
            font-size: 28px;
            font-weight: 600;
            line-height: 2;
            margin-bottom: 20px;
            color: #2c3e50;
            font-family: 'Cairo', sans-serif;
        }

        body.dark-mode .arabic {
            color: #ecf0f1;
        }

        .translation {
            font-size: 15px;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        body.dark-mode .translation {
            color: #bdc3c7;
        }

        .count {
            font-size: 18px;
            color: #f5576c;
            font-weight: 700;
            margin-top: 15px;
        }

        .adhkar-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .nav-btn-adhkar {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-btn-adhkar:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .nav-btn-adhkar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading, .error {
            text-align: center;
            padding: 50px 30px;
            font-size: 18px;
            border-radius: 20px;
            margin: 20px 0;
            animation: slideIn 0.5s ease;
        }

        .loading {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
            font-weight: 600;
        }

        .error {
            background: linear-gradient(135deg, rgba(245, 87, 108, 0.1) 0%, rgba(240, 147, 251, 0.1) 100%);
            color: #f5576c;
            font-weight: 600;
        }

        /* Spinner */
        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .prayer-times-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .prayer-card {
                padding: 20px;
            }

            .prayer-icon {
                font-size: 40px;
            }

            .prayer-time {
                font-size: 24px;
            }

            .compass-wrapper {
                max-width: 300px;
            }

            .compass-direction {
                font-size: 22px;
            }

            .qibla-indicator {
                font-size: 28px;
            }

            .compass-center {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .adhkar-card {
                padding: 25px 20px;
            }

            .arabic {
                font-size: 22px;
            }

            .navigation {
                gap: 8px;
                padding: 15px 10px;
            }

            .nav-btn {
                padding: 12px 16px;
                font-size: 12px;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>🕌 Salatuk Pro</h1>
        </div>
        <div class="controls">
            <select id="languageSelect" class="language-select">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </div>

    <nav class="navigation">
        <button class="nav-btn active" data-tab="prayers">
            <i class="fas fa-clock"></i>
            <span id="nav-prayers">أوقات الصلاة</span>
        </button>
        <button class="nav-btn" data-tab="compass">
            <i class="fas fa-compass"></i>
            <span id="nav-compass">البوصلة</span>
        </button>
        <button class="nav-btn" data-tab="adhkar">
            <i class="fas fa-book"></i>
            <span id="nav-adhkar">الأذكار</span>
        </button>
    </nav>

    <div class="container">
        <!-- Prayer Times -->
        <div id="prayers" class="content active">
            <div id="prayerLoading" class="loading">
                <div class="spinner"></div>
                جاري جلب أوقات الصلاة...
            </div>
            <div id="prayerError" class="error" style="display: none;"></div>
            <div class="prayer-times-grid" id="prayerTimesGrid"></div>
            <div id="nextPrayerAlert" class="next-prayer-alert" style="display: none;">
                <h3 id="nextPrayerName"></h3>
                <p class="next-prayer-time" id="nextPrayerTime"></p>
            </div>
        </div>

        <!-- Compass -->
        <div id="compass" class="content">
            <div id="compassLoading" class="loading">
                <div class="spinner"></div>
                جاري تحديد موقعك...
            </div>
            <div id="compassError" class="error" style="display: none;"></div>
            <div class="compass-container" id="compassContainer" style="display: none;">
                <div class="compass-wrapper">
                    <div class="compass" id="compassElement">
                        <div class="compass-direction north">N</div>
                        <div class="compass-direction east">E</div>
                        <div class="compass-direction south">S</div>
                        <div class="compass-direction west">W</div>
                        <div class="qibla-needle" id="qiblaNeedle">
                            <div class="qibla-indicator">🕌</div>
                        </div>
                    </div>
                    <div class="compass-center">
                        <div>🧭</div>
                    </div>
                </div>
                <div class="compass-info">
                    <h3>اتجاه القبلة</h3>
                    <p class="qibla-angle" id="qiblaAngle">--°</p>
                    <p class="coordinates" id="coordinates"></p>
                </div>
            </div>
        </div>

        <!-- Adhkar -->
        <div id="adhkar" class="content">
            <div class="adhkar-container">
                <div class="adhkar-categories" id="adhkarCategories"></div>
                <div class="adhkar-card">
                    <div class="adhkar-counter">
                        <span id="adhkarCounter"></span>
                    </div>
                    <div class="adhkar-text">
                        <p class="arabic" id="adhkarText"></p>
                        <p class="translation" id="adhkarTranslation" style="display: none;"></p>
                        <p class="count" id="adhkarCount" style="display: none;"></p>
                    </div>
                    <div class="adhkar-controls">
                        <button class="nav-btn-adhkar" id="adhkarPrev">← السابق</button>
                        <button class="nav-btn-adhkar" id="adhkarNext">التالي →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Adhkar Data
        const adhkarData = {
            morning: [
                {
                    text: 'أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ',
                    translation: 'We have entered the morning and Allah is the Owner of all things',
                    count: 1,
                },
                {
                    text: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْماً نَافِعاً وَرِزْقاً طَيِّباً وَعَمَلاً مُتَقَبَّلاً',
                    translation: 'O Allah, I ask You for beneficial knowledge, good provision, and accepted deeds',
                    count: 3,
                },
                {
                    text: 'سُبْحَانَ اللَّهِ وَبِحَمْدِهِ',
                    translation: 'Glory be to Allah and praise be to Him',
                    count: 100,
                },
            ],
            evening: [
                {
                    text: 'أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ',
                    translation: 'We have entered the evening and Allah is the Owner of all things',
                    count: 1,
                },
                {
                    text: 'اللَّهُمَّ أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لَكَ',
                    translation: 'O Allah, as evening comes, all praise is due to You',
                    count: 1,
                },
            ],
            sleep: [
                {
                    text: 'اللَّهُمَّ بِاسْمِكَ أَمُوتُ وَأَحْيَا',
                    translation: 'O Allah, in Your name I die and I live',
                    count: 1,
                },
                {
                    text: 'بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ',
                    translation: 'In the name of Allah, with whose name nothing is harmed in the earth or the sky, and He is the All-Hearing, the All-Knowing',
                    count: 3,
                },
            ],
            waking: [
                {
                    text: 'الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ',
                    translation: 'Praise be to Allah who gave us life after giving us death, and to Him is our return',
                    count: 1,
                },
                {
                    text: 'الْحَمْدُ لِلَّهِ الَّذِي عَافَانِي فِي جَسَدِي وَرَدَّ عَلَيَّ رُوحِي وَأَذِنَ لِي بِذِكْرِهِ',
                    translation: 'Praise be to Allah who granted me health in my body, returned my soul to me, and permitted me to remember Him',
                    count: 1,
                },
            ],
        };

        const categories = {
            morning: { name: 'أذكار الصباح', emoji: '🌅' },
            evening: { name: 'أذكار المساء', emoji: '🌆' },
            sleep: { name: 'أذكار النوم', emoji: '😴' },
            waking: { name: 'أذكار الاستيقاظ', emoji: '☀️' },
        };

        // State
        let currentTab = 'prayers';
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        let currentAdhkarCategory = 'morning';
        let currentAdhkarIndex = 0;
        let userLocation = null;
        let deviceHeading = 0;
        let currentLanguage = 'ar';

        // Initialize
        function init() {
            setupTheme();
            setupNavigation();
            setupAdhkar();
            setupLanguage();
            fetchPrayerTimes();
            getLocation();
            requestDeviceOrientation();
        }

        // Theme
        function setupTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            }
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeToggle').textContent = isDarkMode ? '☀️' : '🌙';
        }

        // Language
        function setupLanguage() {
            document.getElementById('languageSelect').addEventListener('change', changeLanguage);
        }

        function changeLanguage(e) {
            currentLanguage = e.target.value;
            if (currentLanguage === 'en') {
                document.documentElement.dir = 'ltr';
                document.getElementById('nav-prayers').textContent = 'Prayer Times';
                document.getElementById('nav-compass').textContent = 'Compass';
                document.getElementById('nav-adhkar').textContent = 'Adhkar';
            } else {
                document.documentElement.dir = 'rtl';
                document.getElementById('nav-prayers').textContent = 'أوقات الصلاة';
                document.getElementById('nav-compass').textContent = 'البوصلة';
                document.getElementById('nav-adhkar').textContent = 'الأذكار';
            }
        }

        // Navigation
        function setupNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', switchTab);
            });
        }

        function switchTab(e) {
            const tab = e.currentTarget.dataset.tab;
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
        }

        // Prayer Times
        function fetchPrayerTimes() {
            if (!userLocation) {
                setTimeout(fetchPrayerTimes, 500);
                return;
            }

            const { latitude, longitude } = userLocation;
            const url = `https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=2`;

            fetch(url)
                .then(res => res.json())
                .then(data => displayPrayerTimes(data.data))
                .catch(err => {
                    document.getElementById('prayerLoading').style.display = 'none';
                    document.getElementById('prayerError').style.display = 'block';
                    document.getElementById('prayerError').textContent = 'فشل جلب أوقات الصلاة. تأكد من الإنترنت';
                });
        }

        function formatTime(time24) {
            const [h, m] = time24.split(':').map(Number);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function displayPrayerTimes(data) {
            document.getElementById('prayerLoading').style.display = 'none';
            const timings = data.timings;
            const prayers = [
                { name: 'الفجر', time: formatTime(timings.Fajr), icon: '🌙', en: 'Fajr' },
                { name: 'الظهر', time: formatTime(timings.Dhuhr), icon: '☀️', en: 'Dhuhr' },
                { name: 'العصر', time: formatTime(timings.Asr), icon: '🌤️', en: 'Asr' },
                { name: 'المغرب', time: formatTime(timings.Maghrib), icon: '🌅', en: 'Maghrib' },
                { name: 'العشاء', time: formatTime(timings.Isha), icon: '🌃', en: 'Isha' },
            ];

            const grid = document.getElementById('prayerTimesGrid');
            grid.innerHTML = '';

            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            let nextPrayer = null;

            prayers.forEach(prayer => {
                const [h, m] = prayer.time.split(':').map(Number);
                const prayerMinutes = h * 60 + m;
                const isNext = currentTime < prayerMinutes && !nextPrayer;

                if (isNext) nextPrayer = prayer;

                const card = document.createElement('div');
                card.className = `prayer-card ${isNext ? 'next' : ''}`;
                const name = currentLanguage === 'en' ? prayer.en : prayer.name;
                card.innerHTML = `
                    <div class="prayer-icon">${prayer.icon}</div>
                    <h3 class="prayer-name">${name}</h3>
                    <p class="prayer-time">${prayer.time}</p>
                `;
                grid.appendChild(card);
            });

            if (nextPrayer) {
                document.getElementById('nextPrayerAlert').style.display = 'block';
                const name = currentLanguage === 'en' ? `Next Prayer: ${nextPrayer.en}` : `الصلاة القادمة: ${nextPrayer.name}`;
                document.getElementById('nextPrayerName').textContent = name;
                document.getElementById('nextPrayerTime').textContent = nextPrayer.time;
            }
        }

        // Location & Compass
        function getLocation() {
            if (!navigator.geolocation) {
                showCompassError('الخدمة غير متاحة');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => {
                    userLocation = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                    };
                    document.getElementById('compassLoading').style.display = 'none';
                    document.getElementById('compassContainer').style.display = 'flex';
                    updateQibla();
                    fetchPrayerTimes();
                },
                err => showCompassError('فشل تحديد الموقع')
            );
        }

        function showCompassError(msg) {
            document.getElementById('compassLoading').style.display = 'none';
            document.getElementById('compassError').style.display = 'block';
            document.getElementById('compassError').textContent = msg;
        }

        function calculateQibla(lat, lon) {
            const MECCA_LAT = 21.4225;
            const MECCA_LON = 39.8262;

            const lat1 = (lat * Math.PI) / 180;
            const lat2 = (MECCA_LAT * Math.PI) / 180;
            const dLon = ((MECCA_LON - lon) * Math.PI) / 180;

            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);

            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        function updateQibla() {
            if (!userLocation) return;

            const qibla = calculateQibla(userLocation.latitude, userLocation.longitude);
            document.getElementById('qiblaAngle').textContent = Math.round(qibla) + '°';
            document.getElementById('coordinates').textContent = 
                `${userLocation.latitude.toFixed(4)}° / ${userLocation.longitude.toFixed(4)}°`;
        }

        function requestDeviceOrientation() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(perm => {
                            if (perm === 'granted') {
                                window.addEventListener('deviceorientation', handleDeviceOrientation);
                            }
                        })
                        .catch(() => {
                            window.addEventListener('deviceorientation', handleDeviceOrientation);
                        });
                } else {
                    window.addEventListener('deviceorientation', handleDeviceOrientation);
                }
            }
        }

        function handleDeviceOrientation(event) {
            if (!userLocation) return;
            
            deviceHeading = event.alpha || 0;
            updateCompassView();
        }

        function updateCompassView() {
            if (!userLocation) return;

            const qibla = calculateQibla(userLocation.latitude, userLocation.longitude);
            const qiblaRotation = qibla - deviceHeading;

            document.getElementById('compassElement').style.transform = `rotate(${-deviceHeading}deg)`;
            document.getElementById('qiblaNeedle').style.transform = `rotate(${qiblaRotation}deg)`;
        }

        // Adhkar
        function setupAdhkar() {
            const container = document.getElementById('adhkarCategories');
            Object.entries(categories).forEach(([key, value]) => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${key === 'morning' ? 'active' : ''}`;
                btn.innerHTML = `<span>${value.emoji}</span><span>${value.name}</span>`;
                btn.addEventListener('click', () => switchAdhkarCategory(key, btn));
                container.appendChild(btn);
            });

            document.getElementById('adhkarPrev').addEventListener('click', () => changeAdhkar(-1));
            document.getElementById('adhkarNext').addEventListener('click', () => changeAdhkar(1));

            displayAdhkar();
        }

        function switchAdhkarCategory(category, btn) {
            currentAdhkarCategory = category;
            currentAdhkarIndex = 0;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayAdhkar();
        }

        function changeAdhkar(direction) {
            const max = adhkarData[currentAdhkarCategory].length;
            currentAdhkarIndex = Math.max(0, Math.min(max - 1, currentAdhkarIndex + direction));
            displayAdhkar();
        }

        function displayAdhkar() {
            const adhkar = adhkarData[currentAdhkarCategory][currentAdhkarIndex];
            const max = adhkarData[currentAdhkarCategory].length;

            document.getElementById('adhkarCounter').textContent = `${currentAdhkarIndex + 1} / ${max}`;
            document.getElementById('adhkarText').textContent = adhkar.text;

            if (adhkar.translation) {
                document.getElementById('adhkarTranslation').textContent = adhkar.translation;
                document.getElementById('adhkarTranslation').style.display = 'block';
            } else {
                document.getElementById('adhkarTranslation').style.display = 'none';
            }

            if (adhkar.count) {
                document.getElementById('adhkarCount').textContent = `× ${adhkar.count}`;
                document.getElementById('adhkarCount').style.display = 'block';
            } else {
                document.getElementById('adhkarCount').style.display = 'none';
            }

            document.getElementById('adhkarPrev').disabled = currentAdhkarIndex === 0;
            document.getElementById('adhkarNext').disabled = currentAdhkarIndex === max - 1;
        }

        // Start
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
